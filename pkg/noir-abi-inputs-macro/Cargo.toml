[package]
name = "noir-abi-inputs-macro"
version = "0.1.0"
edition = "2024"

[lib]
proc-macro = true

[features]
default = []
serde = []

[dependencies]
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { workspace = true, features = ["full"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
workspace-hack.workspace = true
